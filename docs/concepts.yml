# Glossary rendered in the README "Concepts" section. Term -> one-line definition.
- term: Severity level
  definition: A classification (default, success, error, warning, information, help) that selects the icon and color scheme applied to a dialog.
- term: Dialog patterns
  definition: confirm and input are dialog-specific UX wrappers around the severity model — confirm defaults to Help severity with Yes/No buttons; input defaults to Information severity with a projected content component and OK/Cancel buttons.
- term: Footer item
  definition: An entry in the dialog footer with a key (used in the returned footerValues record) and an align ('start' flows left, 'end' flows right). The first 'end' item gets margin-left auto, separating start- and end-aligned items.
- term: Footer button emphasis
  definition: Visual weight of a footer button — 'primary' (filled, severity-colored), 'destructive' (filled, always Error-colored regardless of dialog severity), or 'text' (no fill).
- term: Dismiss reason
  definition: The cause of a dialog closing — Affirm, Deny, Cancel, or Close. Footer buttons declare a result to map their click; backdrop click and Escape both emit Close with empty footer values.
- term: Provider config
  definition: The DI-provided configuration (TBX_MAT_DIALOG_PROVIDER_CONFIG) that supplies the severity icon resolver and an optional close icon resolver. Required.
- term: Content component
  definition: A consumer-defined @Component that implements TbxMatDialogData<T>. Used in the body of input dialogs; the shell reads isValid to drive the affirm button's disabled state and value to extract data on confirm.
